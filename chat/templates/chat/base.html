<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Snickr{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'chat/style.css' %}">
</head>
<body>

<!-- ============================================================
     TOP NAVBAR
============================================================ -->
{% if request.session.user_id %}
<nav class="navbar navbar-dark snickr-navbar px-3 py-0">
    <a class="navbar-brand fw-bold" href="{% url 'workspace_list' %}">
        <i class="bi bi-chat-square-dots-fill me-1"></i> Snickr
    </a>

    <form class="d-flex mx-auto snickr-search-bar" method="GET" action="{% url 'search' %}">
        <input class="form-control form-control-sm"
               type="search" name="keyword"
               placeholder="Search messages..."
               value="{{ request.GET.keyword }}">
        <button class="btn btn-sm btn-outline-light ms-1" type="submit">
            <i class="bi bi-search"></i>
        </button>
    </form>

    <div class="d-flex align-items-center gap-3">
        <a href="{% url 'invitations' %}" class="nav-link text-white">
            <i class="bi bi-bell"></i> Invitations
        </a>
        <a href="{% url 'profile' %}" class="nav-link text-white">
            <i class="bi bi-person-circle"></i> {{ request.session.username }}
        </a>
        <form method="POST" action="{% url 'logout' %}" class="m-0">
            {% csrf_token %}
            <button class="btn btn-sm btn-outline-light" type="submit">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </form>
    </div>
</nav>
{% endif %}

<!-- ============================================================
     FLASH MESSAGES (Django messages framework)
============================================================ -->
{% if messages %}
<div class="snickr-flash">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show mb-0 rounded-0" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
</div>
{% endif %}

<!-- ============================================================
     PAGE CONTENT
============================================================ -->
{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
